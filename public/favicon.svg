<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="cv-bg" x1="4" y1="4" x2="30" y2="28" gradientUnits="userSpaceOnUse">
      <stop stop-color="#6366f1"/>
      <stop offset="1" stop-color="#4338ca"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="7" fill="url(#cv-bg)"/>
  <!-- monogram PF — central baseline + lehký posun pro optické vycentrování -->
  <g transform="translate(16, 16.75)">
    <text
      x="0"
      y="0"
      fill="#f8f7ff"
      dominant-baseline="central"
      text-anchor="middle"
      font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Ubuntu, Cantarell, sans-serif"
      font-size="21"
      font-weight="800"
      letter-spacing="-0.1em"
    >PF</text>
  </g>
</svg>
